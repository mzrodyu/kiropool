name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/mzrodyu/kiropool-server:latest

  client-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run dist:client
      - shell: pwsh
        run: Copy-Item -LiteralPath "dist/client/KiroPool-便携版.exe" -Destination "dist/client/KiroPool-portable.exe" -Force
      - uses: actions/upload-artifact@v4
        with:
          name: KiroPool-portable-windows
          path: dist/client/KiroPool-portable.exe
          if-no-files-found: error

  client-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm --prefix apps/client run dist:mac --workspaces=false
      - uses: actions/upload-artifact@v4
        with:
          name: KiroPool-macos
          path: dist/client/KiroPool-mac-*.dmg
          if-no-files-found: error

  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [client-windows, client-macos]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > notes.md <<'EOF'
          自动构建的桌面客户端。

          Windows 下载 `KiroPool-portable.exe`，输入用户密钥后会自动从云端领取凭证并启动 Kiro。
          macOS 按芯片下载 `KiroPool-mac-x64.dmg` 或 `KiroPool-mac-arm64.dmg`。
          EOF
          gh release view portable-latest >/dev/null 2>&1 || gh release create portable-latest --target "$GITHUB_SHA" --title "KiroPool 客户端" --notes-file notes.md
          gh release edit portable-latest --title "KiroPool 客户端" --notes-file notes.md --latest
          gh release upload portable-latest \
            release-assets/KiroPool-portable-windows/KiroPool-portable.exe \
            release-assets/KiroPool-macos/KiroPool-mac-*.dmg \
            --clobber
