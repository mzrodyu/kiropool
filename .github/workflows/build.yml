name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/mzrodyu/kiropool-server:latest

  client:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run dist:client
      - shell: pwsh
        run: Copy-Item -LiteralPath "dist/client/KiroPool-便携版.exe" -Destination "dist/client/KiroPool-portable.exe" -Force
      - uses: actions/upload-artifact@v4
        with:
          name: KiroPool-portable-windows
          path: dist/client/KiroPool-portable.exe
          if-no-files-found: error
      - uses: actions/github-script@v7
        if: github.ref == 'refs/heads/main'
        with:
          script: |
            const { owner, repo } = context.repo;
            try {
              const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag: 'portable-latest' });
              for (const asset of release.data.assets) {
                await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: asset.id });
              }
            } catch (error) {
              if (error.status !== 404) throw error;
            }
      - uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: portable-latest
          name: KiroPool 便携版
          body: |
            自动构建的 Windows 便携版。

            下载 `KiroPool-portable.exe`，打开后可导入网页下载的拼车用户凭证并启动 Kiro。
          make_latest: true
          files: dist/client/KiroPool-portable.exe
