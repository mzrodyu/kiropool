name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/mzrodyu/kiropool-server:latest

  client-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run dist:client
      - shell: pwsh
        run: Copy-Item -LiteralPath "dist/client/KiroPool-便携版.exe" -Destination "dist/client/KiroPool-portable.exe" -Force
      - name: Upload Windows client to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: portable-latest
          name: KiroPool 客户端
          body: |
            自动构建的桌面客户端。

            Windows 下载 `KiroPool-portable.exe`，输入用户密钥后会自动从云端领取凭证并启动 Kiro。
          make_latest: true
          overwrite_files: true
          files: dist/client/KiroPool-portable.exe

  client-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm --prefix apps/client run dist:mac --workspaces=false
      - name: Upload macOS clients to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: portable-latest
          name: KiroPool 客户端
          overwrite_files: true
          files: dist/client/KiroPool-mac-*.dmg
