name: Guard

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: Block runtime data
        shell: pwsh
        run: |
          $forbidden = @(
            'apps/server/data',
            'dist',
            '.env'
          )
          $tracked = git ls-files
          foreach ($path in $forbidden) {
            if ($tracked | Where-Object { $_ -like "$path/*" -or $_ -eq $path }) {
              Write-Error "Forbidden tracked path: $path"
            }
          }
